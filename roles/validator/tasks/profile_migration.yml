---
- name: Stop service
  ansible.builtin.systemd:
    name: "{{ service_identifier }}"
    state: stopped

- name: Read NODE_OPERATOR_KEY_PASSWORD from secrets env file
  ansible.builtin.shell: |
    set -a
    . "{{ validator_environment_secrets_file_path }}"
    printf '%s' "$NODE_OPERATOR_KEY_PASSWORD"
  args:
    executable: /bin/bash
  register: node_operator_key_password
  changed_when: false
  no_log: true

- name: Migrate profile
  ansible.builtin.expect:
    command: "{{ validator_bin_dir }}/{{ service_identifier }} profile migrate"
    chdir: "{{ validator_home_dir }}"
    responses:
      (?i)password: "{{ node_operator_key_password.stdout | trim }}"
  register: profile_migrate_result
  failed_when: profile_migrate_result.rc != 0
  no_log: true
  notify:
    - Restart service
